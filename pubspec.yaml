name: mozzarella_pizza
description: "Aplicación para la compra de pizzas mozzarella"
publish_to: 'Erick Cepeda'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  icons_launcher: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

icons_launcher:
  image_path: "assets/logo.jpg"
  platforms:
    android:
      enable: true
    ios:
      enable: true